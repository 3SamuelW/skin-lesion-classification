# SVM skin lesion 3-class config (V14b best-feature version)
#
# The data paths below are defaults and can be overridden at runtime via
# --data_root <your_dataset_dir>  (e.g. --data_root /path/to/my_dataset)
# That will automatically resolve to:
#   image_dir = <data_root>/image
#   mask_dir  = <data_root>/mask
#   label_csv = <data_root>/label.csv
#
# Train:
#   python src/train_svm.py --config config/svm.yaml --experiment_id svm_exp001 --data_root /path/to/dataset
#
# Predict:
#   python src/predict_svm.py --config config/svm.yaml --experiment_id svm_exp001 \
#       --image_path /path/to/image.jpg --mask_path /path/to/mask.jpg

model: svm

data:
  image_dir: data/image
  mask_dir:  data/mask
  label_csv: data/label.csv
  output_dir: outputs

svm:
  split:
    train_size:   0.7
    val_size:     0.1
    test_size:    0.2
    random_state: 42
    group_by:     base_id

  features:
    use_color:            true
    use_advanced_color:   true
    use_texture:          true
    use_advanced_texture: true
    use_shape:            true
    use_advanced_shape:   true
    use_clinical:         true
    use_melanin_features: true
    use_hog:              false

    mask_threshold:  127
    hsv_hist_bins:   16
    lbp_points:      24
    lbp_radius:      3
    lbp_multi_radii: [1, 3, 5, 7]
    glcm_levels:     4          # 4-level grey quantisation (V14b)
    glcm_distances:  [1, 2, 4]

  preprocessing:
    normalize:        true
    morphology:       false
    hair_removal:     false
    gamma_correction: true
    gamma_value:      1.06      # mild gamma boost
    clahe:            true
    clahe_kernel:     7
    clahe_clip:       0.03
    color_normalize:  true      # skin-only Shades-of-Gray
    shades_of_gray_p: 6

  model:
    kernel:        rbf
    class_weight:  balanced    # compensates for vasc being minority class
    probability:   true
    random_state:  42

  pca:
    enabled:      true
    n_components: 0.95         # retain 95 % variance

  grid_search:
    enabled: true
    cv:      5
    n_jobs:  1                 # set to -1 if multiprocessing works on your OS
    scoring: f1_macro
    C:       [0.1, 1, 10, 100]
    gamma:   [scale, 0.001, 0.01, 0.1]
